<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC Simulation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0e17;
      color: #e8e6f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1825;
      border-bottom: 1px solid #2e2b40;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #c9b8ff;
      letter-spacing: 0.02em;
    }

    .world-info {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 0.78rem;
      color: #8b88a8;
    }

    .world-info span { display: flex; align-items: center; gap: 5px; }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      background: #13121f;
      border-right: 1px solid #2e2b40;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 8px;
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5a5870;
      margin-bottom: 4px;
    }

    .npc-card {
      background: #1e1c2e;
      border: 1px solid #2e2b40;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .npc-card:hover { background: #252338; border-color: #4e4b6a; }
    .npc-card.active { border-color: #7c6fcd; background: #211e36; }

    .npc-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: #ddd8ff;
      margin-bottom: 2px;
    }

    .npc-role {
      font-size: 0.72rem;
      color: #7a779a;
      margin-bottom: 6px;
    }

    .emotion-badge {
      display: inline-block;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: #2e2b45;
      color: #a89fdc;
      border: 1px solid #3d3960;
    }

    .emotion-badge.happy    { background: #1e2e1a; color: #7ecf6e; border-color: #3a5c32; }
    .emotion-badge.sad      { background: #1a1f2e; color: #6ea8cf; border-color: #2d4060; }
    .emotion-badge.angry    { background: #2e1a1a; color: #cf6e6e; border-color: #5c3232; }
    .emotion-badge.curious  { background: #2a2214; color: #cfb56e; border-color: #5c4a28; }

    .npc-inventory {
      margin-top: 6px;
      font-size: 0.68rem;
      color: #5a5870;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .npc-header {
      padding: 14px 20px;
      border-bottom: 1px solid #2e2b40;
      background: #13121f;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .npc-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2e2b45;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .npc-header-info .npc-name { font-size: 0.95rem; }
    .npc-header-info .npc-role { font-size: 0.75rem; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #2e2b40; border-radius: 3px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 75%;
    }

    .message.player { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .message.npc .bubble {
      background: #1e1c2e;
      border: 1px solid #2e2b40;
      color: #ddd8ff;
      border-bottom-left-radius: 4px;
    }

    .message.player .bubble {
      background: #4a3fa0;
      color: #f0eeff;
      border-bottom-right-radius: 4px;
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #2e2b45;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .message.player .msg-avatar { background: #4a3fa0; }

    .system-msg {
      align-self: center;
      font-size: 0.72rem;
      color: #4e4b6a;
      background: #13121f;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid #2e2b40;
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 20px;
      border-top: 1px solid #2e2b40;
      background: #13121f;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      background: #1e1c2e;
      border: 1px solid #2e2b40;
      border-radius: 10px;
      color: #e8e6f0;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #msg-input:focus { border-color: #6b5fcf; }
    #msg-input::placeholder { color: #4e4b6a; }

    #send-btn {
      background: #6b5fcf;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) { background: #7c6fdc; }
    #send-btn:disabled { background: #2e2b45; color: #5a5870; cursor: not-allowed; }

    .typing-indicator {
      display: none;
      align-self: flex-start;
    }

    .typing-indicator.visible { display: flex; }

    .typing-dots {
      background: #1e1c2e;
      border: 1px solid #2e2b40;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 10px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 6px; height: 6px;
      background: #6b5fcf;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #4e4b6a;
      gap: 8px;
      font-size: 0.9rem;
    }

    .empty-state .icon { font-size: 2.5rem; }

    #reset-btn {
      background: transparent;
      border: 1px solid #3d3960;
      color: #7a779a;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    #reset-btn:hover { border-color: #c06060; color: #e08080; background: #1f1418; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }

    .modal {
      background: #1a1825;
      border: 1px solid #3d3960;
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }
    .modal h2 { font-size: 1rem; color: #e8e6f0; margin-bottom: 8px; }
    .modal p  { font-size: 0.82rem; color: #7a779a; line-height: 1.5; margin-bottom: 22px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-btns button {
      border-radius: 8px;
      padding: 8px 22px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      border: none;
    }
    #modal-cancel { background: #2e2b45; color: #a8a5c8; }
    #modal-cancel:hover { background: #3a3760; }
    #modal-confirm { background: #8b3030; color: #ffdede; }
    #modal-confirm:hover { background: #a03a3a; }
  </style>
</head>
<body>

<header>
  <h1>⚔️ NPC Simulation</h1>
  <div class="world-info">
    <span>🌤 <span id="weather">—</span></span>
    <span>🕐 <span id="time-of-day">—</span></span>
    <span>💰 <span id="gold">—</span> gold</span>
    <span>⏱ Tick <span id="sim-time">—</span></span>
  </div>
  <button id="reset-btn">🔄 Reset</button>
</header>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Reset simulation?</h2>
    <p>This will wipe all NPC memories, quests, and tick history and start a completely fresh playthrough. This cannot be undone.</p>
    <div class="modal-btns">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-confirm">Reset everything</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">NPCs</div>
    <div id="npc-list"></div>
  </div>

  <div class="chat-area">
    <div class="npc-header" id="npc-header" style="display:none">
      <div class="npc-avatar" id="header-avatar"></div>
      <div class="npc-header-info">
        <div class="npc-name" id="header-name"></div>
        <div class="npc-role" id="header-role"></div>
      </div>
      <div style="margin-left:auto">
        <span class="emotion-badge" id="header-emotion"></span>
      </div>
    </div>

    <div id="messages" class="messages">
      <div class="empty-state" id="empty-state">
        <div class="icon">💬</div>
        <div>Select an NPC to start talking</div>
      </div>
    </div>

    <div class="typing-indicator" id="typing">
      <div class="typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>

    <div class="input-bar">
      <input id="msg-input" type="text" placeholder="Say something to the NPC…" disabled autocomplete="off" />
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
  const NPC_META = {
    malrik_merchant: { emoji: '🧑‍💼', label: 'Merchant' },
    helena_guard:    { emoji: '⚔️',   label: 'Town Guard' },
    rowan_bard:      { emoji: '🎵',   label: 'Bard' },
  };

  let state = null;
  let activeNpc = null;
  const histories = {};

  async function loadState() {
    const res = await fetch('/load', { method: 'POST' });
    const data = await res.json();
    applyState(data.state);
  }

  function applyState(s) {
    state = s;
    document.getElementById('weather').textContent = s.weather || '—';
    document.getElementById('time-of-day').textContent = s.time_of_day || '—';
    document.getElementById('gold').textContent = s.player_stats?.gold ?? '—';
    document.getElementById('sim-time').textContent = s.simulation_time ?? '—';
    renderNpcList();
    if (activeNpc) updateHeader(activeNpc);
  }

  function renderNpcList() {
    const list = document.getElementById('npc-list');
    list.innerHTML = '';
    for (const [id, npc] of Object.entries(state.npc_states)) {
      const meta = NPC_META[id] || { emoji: '👤', label: npc.personality };
      const card = document.createElement('div');
      card.className = 'npc-card' + (id === activeNpc ? ' active' : '');
      card.innerHTML = `
        <div class="npc-name">${meta.emoji} ${id.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div>
        <div class="npc-role">${meta.label}</div>
        <span class="emotion-badge ${npc.emotion_state}">${npc.emotion_state}</span>
        <div class="npc-inventory">🎒 ${npc.inventory?.join(', ') || 'nothing'}</div>
      `;
      card.addEventListener('click', () => selectNpc(id));
      list.appendChild(card);
    }
  }

  function selectNpc(id) {
    activeNpc = id;
    if (!histories[id]) histories[id] = [];

    document.getElementById('empty-state')?.remove();
    document.getElementById('npc-header').style.display = 'flex';
    updateHeader(id);
    renderNpcList();
    renderMessages();

    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }

  function updateHeader(id) {
    const npc = state.npc_states[id];
    const meta = NPC_META[id] || { emoji: '👤', label: npc.personality };
    document.getElementById('header-avatar').textContent = meta.emoji;
    document.getElementById('header-name').textContent =
      id.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    document.getElementById('header-role').textContent = meta.label + ' · ' + npc.personality;
    const badge = document.getElementById('header-emotion');
    badge.textContent = npc.emotion_state;
    badge.className = 'emotion-badge ' + npc.emotion_state;
  }

  function renderMessages() {
    const container = document.getElementById('messages');
    const msgs = histories[activeNpc] || [];
    container.innerHTML = msgs.length === 0
      ? `<div class="system-msg">Start the conversation — say hello!</div>`
      : '';
    for (const m of msgs) {
      container.appendChild(makeBubble(m));
    }
    container.scrollTop = container.scrollHeight;
  }

  function makeBubble({ role, text, extra }) {
    const meta = NPC_META[activeNpc] || { emoji: '👤' };
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const avatarEmoji = role === 'player' ? '🧙' : meta.emoji;
    div.innerHTML = `
      <div class="msg-avatar">${avatarEmoji}</div>
      <div class="bubble">${escHtml(text)}</div>
    `;
    return div;
  }

  function appendMessage(role, text) {
    if (!histories[activeNpc]) histories[activeNpc] = [];
    histories[activeNpc].push({ role, text });
    const container = document.getElementById('messages');
    // clear empty placeholder
    container.querySelectorAll('.system-msg').forEach(e => e.remove());
    const bubble = makeBubble({ role, text });
    container.appendChild(bubble);
    container.scrollTop = container.scrollHeight;
  }

  function appendSystemMsg(text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const btn   = document.getElementById('send-btn');
    const text  = input.value.trim();
    if (!text || !activeNpc) return;

    input.value = '';
    input.disabled = true;
    btn.disabled = true;

    appendMessage('player', text);

    document.getElementById('typing').classList.add('visible');
    const container = document.getElementById('messages');
    container.scrollTop = container.scrollHeight;

    try {
      const res = await fetch('/tick', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event: 'player_chat', params: { npc_id: activeNpc, text } })
      });
      const data = await res.json();
      applyState(data.state);

      const reply = data.state.response;
      if (reply && reply !== '…') {
        appendMessage('npc', reply);
      } else {
        appendMessage('npc', '…');
      }

      const pendingQuest = data.state.pending_quest;
      if (pendingQuest) {
        appendSystemMsg(`📜 Quest offered: "${pendingQuest.title || pendingQuest.quest_id}"`);
      }
    } catch (e) {
      appendMessage('npc', '[Error reaching server]');
    } finally {
      document.getElementById('typing').classList.remove('visible');
      input.disabled = false;
      btn.disabled = false;
      input.focus();
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Reset ──────────────────────────────────────────────────────────
  document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.add('visible');
  });

  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('visible');
  });

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('visible');
    }
  });

  document.getElementById('modal-confirm').addEventListener('click', async () => {
    const btn = document.getElementById('modal-confirm');
    btn.textContent = 'Resetting…';
    btn.disabled = true;

    try {
      const res = await fetch('/reset', { method: 'POST' });
      const data = await res.json();
      applyState(data.state);

      // clear all chat histories and UI
      for (const k in histories) delete histories[k];
      activeNpc = null;
      document.getElementById('npc-header').style.display = 'none';
      const msgs = document.getElementById('messages');
      msgs.innerHTML = `<div class="empty-state" id="empty-state"><div class="icon">💬</div><div>Select an NPC to start talking</div></div>`;
      document.getElementById('msg-input').disabled = true;
      document.getElementById('send-btn').disabled = true;

      appendSystemMsgGlobal('✨ Simulation reset. All memories and quests cleared.');
    } catch (e) {
      appendSystemMsgGlobal('[Reset failed — check the server]');
    } finally {
      document.getElementById('modal-overlay').classList.remove('visible');
      btn.textContent = 'Reset everything';
      btn.disabled = false;
    }
  });

  function appendSystemMsgGlobal(text) {
    const container = document.getElementById('messages');
    container.querySelector('.empty-state')?.remove();
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  loadState();
</script>
</body>
</html>
